<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Auto Box Counter - HD Download</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            body {
                background-color: #121212;
                color: #fff;
                font-family: sans-serif;
            }
            .canvas-container {
                position: relative;
                overflow: auto;
                background: #222;
                border: 2px dashed #444;
                border-radius: 8px;
                max-width: 100%;
                margin-top: 15px;
            }
            canvas {
                display: block;
                margin: 0 auto;
                max-width: 100%;
                height: auto;
                cursor: crosshair;
            }
        </style>
    </head>
    <body>
        <div class="container py-4">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center">

                    <div class="mb-3">
                        <label for="imageLoader" class="form-label text-light"
                            >Pilih File:</label
                        >
                        <input
                            class="form-control"
                            type="file"
                            id="imageLoader"
                            accept="image/*"
                        />
                    </div>

                    <div
                        class="d-flex justify-content-between align-items-center bg-dark p-3 rounded mb-2"
                    >
                        <div>
                            Total:
                            <span
                                id="counterDisplay"
                                class="fw-bold text-warning fs-4"
                                >0</span
                            >
                            Box
                        </div>
                        <div>
                            <button
                                id="btnUndo"
                                class="btn btn-sm btn-outline-light me-1"
                            >
                                ↩️ Undo
                            </button>
                            <button
                                id="btnClear"
                                class="btn btn-sm btn-outline-danger"
                            >
                                🗑️ Reset
                            </button>
                        </div>
                    </div>

                    <div class="canvas-container shadow">
                        <canvas id="imageCanvas"></canvas>
                    </div>

                    <div class="mt-3 d-grid">
                        <button
                            id="btnDownload"
                            class="btn btn-success py-2 fw-bold fs-5 shadow"
                            disabled
                        >
                            💾 Simpan Gambar (Kualitas Jernih / HD)
                        </button>
                    </div>

                    <p class="text-muted small mt-2">
                        💡 *Tips: Klik/sentuh karton untuk memberi nomor urut,
                        lalu klik tombol hijau untuk menyimpan ke galeri.*
                    </p>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const imageLoader = document.getElementById("imageLoader");
                const canvas = document.getElementById("imageCanvas");
                const ctx = canvas.getContext("2d");
                const counterDisplay =
                    document.getElementById("counterDisplay");
                const btnUndo = document.getElementById("btnUndo");
                const btnClear = document.getElementById("btnClear");
                const btnDownload = document.getElementById("btnDownload");

                let baseImage = new Image();
                let dots = [];

                // 1. Handle Upload Gambar
                imageLoader.addEventListener("change", handleImage, false);

                function handleImage(e) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        baseImage.onload = function () {
                            // KUNCI KEJERNIHAN: Canvas diset memakai ukuran asli foto (Pixel Sempurna)
                            canvas.width = baseImage.width;
                            canvas.height = baseImage.height;
                            dots = [];
                            redrawCanvas();
                            btnDownload.disabled = false; // Aktifkan tombol download
                        };
                        baseImage.src = event.target.result;
                    };
                    if (e.target.files[0]) {
                        reader.readAsDataURL(e.target.files[0]);
                    }
                }

                // 2. Gambar Ulang Canvas
                function redrawCanvas() {
                    if (!baseImage.src) return;

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(baseImage, 0, 0);

                    dots.forEach((dot, index) => {
                        const number = index + 1;

                        // Ukuran lingkaran dibuat proporsional dengan resolusi gambar asli agar seimbang
                        const radius = Math.max(canvas.width * 0.015, 20);

                        // Lingkaran Merah Transparan
                        ctx.beginPath();
                        ctx.arc(dot.x, dot.y, radius, 0, 2 * Math.PI, false);
                        ctx.fillStyle = "black";
                        ctx.fill();

                        // Garis Tepi Putih
                        ctx.lineWidth = Math.max(canvas.width * 0.002, 3);
                        ctx.strokeStyle = "#ffffff";
                        ctx.stroke();

                        // Angka Urut di tengah
                        ctx.fillStyle = "#ffffff";
                        ctx.font = `bold ${radius * 0.9}px sans-serif`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(number, dot.x, dot.y);
                    });

                    counterDisplay.innerText = dots.length;
                }

                // 3. Deteksi Titik Sentuh / Klik
                function handleDrawEvent(clientX, clientY) {
                    if (!baseImage.src) return;

                    const rect = canvas.getBoundingClientRect();

                    // Konversi koordinat layar HP (kecil) ke resolusi gambar asli (besar)
                    const x =
                        (clientX - rect.left) * (canvas.width / rect.width);
                    const y =
                        (clientY - rect.top) * (canvas.height / rect.height);

                    dots.push({ x: x, y: y });
                    redrawCanvas();
                }

                canvas.addEventListener("mousedown", function (e) {
                    handleDrawEvent(e.clientX, e.clientY);
                });

                canvas.addEventListener(
                    "touchstart",
                    function (e) {
                        e.preventDefault();
                        const touch = e.touches[0];
                        handleDrawEvent(touch.clientX, touch.clientY);
                    },
                    { passive: false }
                );

                // 4. Tombol Undo & Reset
                btnUndo.addEventListener("click", function () {
                    dots.pop();
                    redrawCanvas();
                });

                btnClear.addEventListener("click", function () {
                    if (confirm("Hapus semua nomor?")) {
                        dots = [];
                        redrawCanvas();
                    }
                });

                // 5. FITUR DOWNLOAD HD (Sistem mengambil data mentah Canvas Asli)
                btnDownload.addEventListener("click", function () {
                    if (!baseImage.src) return;

                    // Ambil data format gambar dari canvas resolusi penuh
                    const imageResult = canvas.toDataURL("image/jpeg", 1.0); // 1.0 artinya kualitas maksimal tanpa kompresi

                    // Dapatkan nama file otomatis berdasarkan jumlah box
                    const filename = `mr_count_${dots.length}_box.jpg`;

                    // Proses trigger download otomatis di HP/Browser
                    const link = document.createElement("a");
                    link.download = filename;
                    link.href = imageResult;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
            });
        </script>
    </body>
</html>
